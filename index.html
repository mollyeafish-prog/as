<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sdfghjk</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      color: #e2e8f0;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.6s;
    }

    .container {
      width: 100%;
      max-width: 640px;
      background: #111827;
      border-radius: 28px;
      border: 1px solid #334155;
      overflow: hidden;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
    }

    header {
      background: linear-gradient(to right, #1e2937, #334155);
      padding: 32px 40px;
      text-align: center;
    }

    header h1 {
      font-size: 1.65rem;
      font-weight: 600;
      margin: 0;
    }

    .content { padding: 40px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .progress { font-size: 2.8rem; font-weight: 700; color: #f8fafc; }
    .score-box { text-align: right; }
    .score-label { font-size: 0.8rem; color: #94a3b8; }
    .score { font-size: 1.9rem; font-weight: 600; color: #34d399; }

    #korean {
      background: #1e2937;
      border-radius: 20px;
      padding: 32px;
      font-size: 1.15rem;
      line-height: 1.65;
      margin-bottom: 36px;
      border: 1px solid #475569;
    }

    .section-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 10px;
      padding-left: 8px;
    }

    #answerArea, #wordBank {
      background: #0f172a;
      border: 2px dashed #64748b;
      border-radius: 20px;
      padding: 24px;
      min-height: 130px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-content: flex-start;
    }

    .word {
      background: #334155;
      color: #f1f5f9;
      padding: 13px 24px;
      border-radius: 9999px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .word:hover { background: #475569; transform: translateY(-2px); }
    #answerArea .word { background: #475569; }

    .hint-btn {
      background: #334155;
      color: #67e8f9;
      border: 1px solid #475569;
      padding: 10px 20px;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .result {
      margin: 25px 0;
      padding: 30px 20px;
      border-radius: 20px;
      font-size: 2.2rem;
      font-weight: 700;
      text-align: center;
      display: none;
      line-height: 1.3;
    }

    .correct { background: #14532d; color: #4ade80; }
    .wrong   { 
      background: #991b1b; 
      color: #fecaca; 
      font-size: 2.5rem;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 10px;
    }

    button {
      padding: 18px;
      font-size: 1.1rem;
      font-weight: 500;
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-reset {
      background: #334155;
      color: white;
      border: 1px solid #475569;
    }

    .btn-check {
      background: #22d3ee;
      color: #0f172a;
      font-weight: 600;
    }
  </style>

<body>

<div class="container">
  <header><h1>영어 어순 배열 연습</h1></header>

  <div class="content">
    <div class="top-bar">
      <div>
        <span class="progress" id="progress">1</span>
        <small style="color:#64748b;"> / 10</small>
      </div>
      <div class="score-box">
        <div class="score-label">점수</div>
        <div class="score" id="score">0</div>
      </div>
    </div>

    <div id="korean"></div>

    <div class="section-label">답안 영역</div>
    <div id="answerArea"></div>

    <button class="hint-btn" onclick="showHint()">힌트 보기</button>

    <div class="section-label">단어 선택</div>
    <div id="wordBank"></div>

    <div id="result" class="result"></div>

    <div class="buttons">
      <button class="btn-reset" onclick="resetAnswer()">초기화</button>
      <button class="btn-check" onclick="checkAnswer()">확인하기</button>
    </div>
  </div>
</div>

<canvas id="confetti" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none;"></canvas>

<script>
// Confetti 함수 (기존과 동일)
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#f87171', '#fb923c', '#fbbf24', '#a78bfa', '#67e8f9'];
  let particles = [];

  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height - canvas.height;
      this.size = Math.random() * 12 + 8;
      this.speed = Math.random() * 7 + 5;
      this.angle = Math.random() * 360;
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() { this.y += this.speed; this.angle += 6; }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle * Math.PI / 180);
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
      ctx.restore();
    }
  }

  for (let i = 0; i < 180; i++) particles.push(new Particle());

  let animation = setInterval(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
      p.update();
      p.draw();
      if (p.y > canvas.height) particles.splice(i, 1);
    });
    if (particles.length === 0) {
      clearInterval(animation);
      canvas.style.display = 'none';
    }
  }, 20);
}

// ================== 문제 데이터 ==================
let currentQuestion = 0;
let score = 0;

const questions = [
  {
    korean: "사회학자들은 이러한 과정을 '인종화'라고 부르기를 선호한다.",
    words: ["Sociologists", "prefer", "to", "call", "these", "processes", "'racialization'."],
    correct: ["Sociologists", "prefer", "to", "call", "these", "processes", "'racialization'."]
  }
];

let selected = [];
let originalWords = [];

// ================== 메인 함수 ==================
function loadQuestion() {
  const q = questions[currentQuestion];
  originalWords = [...q.words];
  
  // 배경 원래대로 복구
  document.body.style.background = 'linear-gradient(135deg, #0f172a 0%, #1e2937 100%)';

  document.getElementById('progress').textContent = currentQuestion + 1;
  document.getElementById('score').textContent = score;
  document.getElementById('korean').textContent = q.korean;
  document.getElementById('result').style.display = 'none';

  selected = [];
  renderWordBank();
  updateAnswerArea();
}

function renderWordBank() { /* ... 기존과 동일 ... */ 
  const bank = document.getElementById('wordBank');
  bank.innerHTML = '';
  const remaining = originalWords.filter(w => !selected.includes(w));
  remaining.forEach(word => {
    const div = document.createElement('div');
    div.className = 'word';
    div.textContent = word;
    div.onclick = () => selectWord(word);
    bank.appendChild(div);
  });
}

function selectWord(word) {
  if (!selected.includes(word)) {
    selected.push(word);
    updateAnswerArea();
    renderWordBank();
  }
}

function updateAnswerArea() { /* 기존과 동일 */ 
  const area = document.getElementById('answerArea');
  area.innerHTML = '';
  selected.forEach((word, i) => {
    const div = document.createElement('div');
    div.className = 'word';
    div.textContent = word;
    div.onclick = () => removeWord(i);
    area.appendChild(div);
  });
}

function removeWord(index) {
  selected.splice(index, 1);
  updateAnswerArea();
  renderWordBank();
}

function showHint() {
  const area = document.getElementById('answerArea');
  area.innerHTML = '';
  questions[currentQuestion].correct.forEach((word, i) => {
    const div = document.createElement('div');
    div.className = 'word';
    div.style.background = '#1e40af';
    div.style.color = '#bfdbfe';
    div.textContent = `${i+1}. ${word}`;
    area.appendChild(div);
  });
}

function checkAnswer() {
  const q = questions[currentQuestion];
  const userAnswer = selected.join(" ");
  const correctAnswer = q.correct.join(" ");
  const resultEl = document.getElementById('result');

  if (userAnswer === correctAnswer) {
    score += 10;
    document.getElementById('score').textContent = score;
    resultEl.className = "result correct";
    resultEl.textContent = "정답입니다!";
    resultEl.style.display = 'block';
    
    setTimeout(() => {
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
      }
    }, 1400);
  } else {
    // ❌ 틀렸을 때 강렬 효과
    document.body.style.background = '#991b1b';   // 전체 빨간색
    launchConfetti();
    
    resultEl.className = "result wrong";
    resultEl.innerHTML = `틀렸습니다!<br><span style="font-size:1.1rem; opacity:0.9;">정답: ${correctAnswer}</span>`;
    resultEl.style.display = 'block';
    
    setTimeout(showHint, 900);
  }
}

function resetAnswer() {
  loadQuestion();
}

// 시작
loadQuestion();
</script>
