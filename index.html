<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>영단어 시험</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --main:#38bdf8;
      --main-dark:#0ea5e9;
      --text:#f8fafc;
      --sub:#94a3b8;
      --success:#22c55e;
      --danger:#ef4444;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#111827);
      font-family:Pretendard, sans-serif;
      color:var(--text);

      display:flex;
      justify-content:center;
      align-items:center;

      padding:4%;
    }

    .container{
      width:100%;
      max-width:42rem;

      background:rgba(30,41,59,0.95);
      backdrop-filter:blur(0.8rem);

      border:0.1rem solid rgba(255,255,255,0.08);

      border-radius:1.5rem;
      padding:6%;

      box-shadow:
      0 1rem 3rem rgba(0,0,0,0.35);
    }

    .title{
      text-align:center;
      font-size:clamp(1.8rem,4vw,3rem);
      font-weight:700;

      margin-bottom:8%;
    }

    .unit-select{
      display:flex;
      gap:3%;
      margin-bottom:8%;
    }

    .unit-btn{
      flex:1;

      border:none;
      border-radius:1rem;

      padding:1rem 0;

      background:#334155;
      color:white;

      font-size:1rem;
      font-weight:600;

      cursor:pointer;
      transition:0.25s;
    }

    .unit-btn:hover{
      background:var(--main);
      transform:translateY(-0.2rem);
    }

    .question-box{
      background:#0f172a;

      border-radius:1.2rem;

      padding:8%;
      margin-bottom:6%;

      text-align:center;
    }

    .question-label{
      color:var(--sub);
      font-size:0.95rem;
      margin-bottom:4%;
    }

    .question{
      font-size:clamp(1.5rem,5vw,2.4rem);
      font-weight:700;
    }

    .answer-input{
      width:100%;

      padding:1rem;

      border:none;
      border-radius:1rem;

      outline:none;

      background:#334155;
      color:white;

      font-size:1rem;

      margin-bottom:5%;
    }

    .answer-input::placeholder{
      color:#94a3b8;
    }

    .submit-btn{
      width:100%;

      padding:1rem;

      border:none;
      border-radius:1rem;

      background:var(--main);
      color:white;

      font-size:1rem;
      font-weight:700;

      cursor:pointer;
      transition:0.25s;
    }

    .submit-btn:hover{
      background:var(--main-dark);
    }

    .info{
      margin-top:6%;

      display:flex;
      justify-content:space-between;
      align-items:center;

      color:var(--sub);

      font-size:0.95rem;
    }

    .result{
      text-align:center;
      margin-top:5%;
      font-weight:700;
      min-height:1.5rem;
    }

    .correct{
      color:var(--success);
    }

    .wrong{
      color:var(--danger);
    }

    .progress-wrap{
      width:100%;
      height:0.7rem;

      background:#334155;
      border-radius:999rem;

      overflow:hidden;

      margin-top:5%;
    }

    .progress{
      width:0%;
      height:100%;

      background:linear-gradient(90deg,#38bdf8,#0ea5e9);

      transition:0.3s;
    }

    @media(max-width:600px){

      .unit-select{
        flex-direction:column;
      }

      .container{
        padding:8%;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1 class="title">영단어 시험</h1>

    <div class="unit-select">
      <button class="unit-btn" onclick="selectUnit(11)">11단원</button>
      <button class="unit-btn" onclick="selectUnit(12)">12단원</button>
      <button class="unit-btn" onclick="selectUnit(13)">13단원</button>
    </div>

    <div class="question-box">
      <div class="question-label">뜻을 보고 영어 단어를 입력하세요</div>
      <div class="question" id="question">단원을 선택하세요</div>
    </div>

    <input
      type="text"
      id="answer"
      class="answer-input"
      placeholder="정답 입력"
    >

    <button class="submit-btn" onclick="checkAnswer()">
      정답 확인
    </button>

    <div class="result" id="result"></div>

    <div class="info">
      <span id="score">점수: 0</span>
      <span id="count">0 / 0</span>
    </div>

    <div class="progress-wrap">
      <div class="progress" id="progress"></div>
    </div>

  </div>

  <script>

    const words = {

      11: [
        { meaning:"환경", word:"environment" },
        { meaning:"중요한", word:"important" },
        { meaning:"발견하다", word:"discover" }
      ],

      12: [
        { meaning:"기회", word:"opportunity" },
        { meaning:"도전", word:"challenge" },
        { meaning:"성공", word:"success" }
      ],

      13: [
        { meaning:"기술", word:"technology" },
        { meaning:"경험", word:"experience" },
        { meaning:"발전하다", word:"develop" }
      ]

    };

    let currentUnit = [];
    let currentWord = {};
    let score = 0;
    let solved = 0;

    function selectUnit(unit){

      currentUnit = [...words[unit]];
      score = 0;
      solved = 0;

      updateInfo();
      nextQuestion();

    }

    function nextQuestion(){

      if(currentUnit.length === 0){

        document.getElementById("question").innerText =
          "시험 종료!";

        document.getElementById("result").innerHTML =
          `<span class="correct">최종 점수: ${score}</span>`;

        return;
      }

      const randomIndex =
        Math.floor(Math.random() * currentUnit.length);

      currentWord = currentUnit[randomIndex];

      document.getElementById("question").innerText =
        currentWord.meaning;

      document.getElementById("answer").value = "";
      document.getElementById("result").innerText = "";

    }

    function checkAnswer(){

      const input =
        document.getElementById("answer")
        .value
        .trim()
        .toLowerCase();

      const result =
        document.getElementById("result");

      if(input === currentWord.word){

        score++;

        result.innerHTML =
          `<span class="correct">정답!</span>`;

      }else{

        result.innerHTML =
          `<span class="wrong">
            오답! 정답: ${currentWord.word}
          </span>`;

      }

      currentUnit =
        currentUnit.filter(
          item => item.word !== currentWord.word
        );

      solved++;

      updateInfo();

      setTimeout(() => {
        nextQuestion();
      }, 1000);

    }

    function updateInfo(){

      document.getElementById("score").innerText =
        `점수: ${score}`;

      document.getElementById("count").innerText =
        `${solved} / ${solved + currentUnit.length}`;

      const total =
        solved + currentUnit.length;

      const percent =
        total === 0 ? 100 : (solved / total) * 100;

      document.getElementById("progress").style.width =
        percent + "%";

    }

  </script>

</body>
</html>
